# Config remota de Supabase (se aplica con `supabase config push`).
# Solo declaramos lo que queremos pisar; el resto queda como está en el dashboard.
project_id = "ruugpxfgpbtajrxbabvg"

[auth]
# A dónde redirigen los magic links si no traen redirect_to explícito.
site_url = "https://somosgranito.com"
# Lista blanca de redirects permitidos (sin esto, los links caen en localhost).
# Mantenemos también el dominio viejo de github.io por si queda algún link en tránsito.
additional_redirect_urls = [
  "https://somosgranito.com/**",
  "https://www.somosgranito.com/**",
  "https://simonet46.github.io/podio-c7217b/**",
]

# Valores que ya están así en remoto — los fijamos para que el push no los
# pise con los defaults del CLI.
[auth.email]
enable_confirmations = true
max_frequency = "1m0s"
otp_length = 8
# Los magic links duran 24 h (el default de 1 h dejaba links muertos si el
# atleta no abría el email enseguida).
otp_expiry = 86400

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

# NOTA: los templates de email custom (supabase/templates/*.html) requieren
# SMTP propio (p. ej. Resend) — el plan free con el mailer default no permite
# modificarlos. Cuando haya SMTP, agregar:
#   [auth.email.template.invite]
#   subject = "Bienvenido/a a GRANITO 🥇 Tu cuenta de atleta está lista"
#   content_path = "./supabase/templates/invite.html"
#   [auth.email.template.magic_link]
#   subject = "Tu link de acceso a GRANITO"
#   content_path = "./supabase/templates/magic_link.html"
