name: Deploy a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un deploy a la vez, PERO sin cancelar los que están en curso: si en el medio
# se dispara otra publicación (p. ej. un atleta conecta su MP), se encola en
# vez de perderse. Así ninguna publicación queda silenciosamente descartada.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build (export estático — dominio propio somosgranito.com)
        run: npm run build
        env:
          # Sin basePath: el sitio se sirve desde la raíz del dominio propio.
          # (Antes iba en /podio-c7217b sobre github.io.)
          NEXT_PUBLIC_SITE_URL: https://somosgranito.com
          # Supabase (públicas: la anon key va igual en el bundle del cliente).
          # Definidas como "Variables" del repo (Settings → Secrets and variables → Actions → Variables).
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      # El backoffice NO se publica en el sitio público: vive en un deploy
      # separado (Cloudflare Pages, detrás de Cloudflare Access).
      - name: Excluir backoffice del sitio público
        run: |
          rm -rf ./out/backoffice
          rm -rf ./out/_next/static/chunks/app/backoffice
      # Evita que GitHub Pages procese con Jekyll (si no, ignora /_next).
      - run: touch ./out/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
